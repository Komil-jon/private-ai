<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Private AI</title>

  <link rel="icon" type="image/png" href="/static/images/icon.svg">

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu&family=Poppins&display=swap" rel="stylesheet">

  <!-- Scrollbar -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/malihu-custom-scrollbar-plugin/3.1.3/jquery.mCustomScrollbar.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <!-- Loader -->
  <div id="loader">
    <section class="wrapper">
      <section class="icon icon2">
        <section class="planetoid"></section>
        <section class="planet"></section>
        <section class="ring-planet"></section>
        <div class="trademark">Eternal 2026</div>
      </section>
    </section>
  </div>

  <!-- Alert Box -->
  <div id="alert" class="alert-box hidden" style="display: block;">
    <div style="padding: 2vh;">

      <div style="padding: 1vh; font-weight: bold; color: moccasin; text-align: center; font-size: 2vh;">
        <i class="fa-solid fa-circle-info"></i> System
      </div>

      <div id="alert-message"
           style="background-color: #e0e0e0; padding: 1vh 0; color: #444; text-align: center; border-radius: 1vh;">
        Your activity has been reported!
      </div>

      <div style="padding-top: 2vh; text-align: center;">
        <button id="ok-btn"
                style="padding: 1vh 5vh; background-color: #999; color: white; border: none; border-radius: 1vh; cursor: pointer;">
          OK
        </button>
      </div>

    </div>
  </div>

  <!-- Main Content -->
  <div id="content" class="hidden">

    <div class="chat">

      <div class="chat-title">
        <h1>Obelius</h1>
        <h2><i class="fa-solid fa-user-tie"></i> Private AI</h2>

        <button id="history-toggle-btn" title="Conversation history">
          <i class="fa-solid fa-clock-rotate-left"></i>
        </button>

        <figure class="avatar">
          <img src="/static/images/icon.svg" alt="logo">
        </figure>
      </div>

      <!-- History Drawer -->
      <div id="history-drawer" class="history-drawer collapsed">
        <div class="history-drawer-header">
          <span><i class="fa-solid fa-clock-rotate-left"></i> History</span>
          <button id="history-clear-btn" title="Clear history">
            <i class="fa-solid fa-trash-can"></i>
          </button>
        </div>
        <div id="history-list" class="history-list">
          <div class="history-empty">No saved messages yet.</div>
        </div>
      </div>

      <div class="messages">
        <div class="messages-content"></div>
      </div>

      <div class="message-box">

        <!-- File Upload Panel (expands upward inside message-box) -->
        <div id="upload-panel" class="upload-panel collapsed">
          <div id="drop-zone" class="drop-zone">
            <input type="file" id="file-input" multiple accept=".pdf,.docx,.txt,.csv" hidden>
            <div class="drop-zone-inner">
              <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
              <p class="drop-label">Drop files here or <span class="drop-browse" id="browse-trigger">browse</span></p>
              <p class="drop-hint">PDF · DOCX · TXT · CSV</p>
            </div>
          </div>
          <div id="file-list" class="file-list"></div>
          <div class="upload-actions">
            <button id="upload-submit-btn" class="upload-submit-btn" disabled>
              <i class="fa-solid fa-arrow-up-from-bracket"></i> Upload
            </button>
            <div id="upload-status" class="upload-status"></div>
          </div>
        </div>

        <!-- Input row: paperclip | textarea | send -->
        <div class="message-input-row">
          <button id="upload-toggle-btn" title="Upload documents">
            <i class="fa-solid fa-paperclip"></i>
          </button>
          <textarea class="message-input" placeholder="Type message..."></textarea>
          <button type="submit" class="message-submit" title="Send">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>

      </div>

    </div>

    <!-- Disclaimer -->
    <p class="ai-disclaimer">
      <i class="fa-solid fa-triangle-exclamation"></i>
      Obelius can make mistakes. Verify important information independently.
    </p>

  </div>

  <!-- Scripts -->
  <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/malihu-custom-scrollbar-plugin/3.1.3/jquery.mCustomScrollbar.concat.min.js"></script>
  <script src="/static/script.js"></script>

</body>
</html>
